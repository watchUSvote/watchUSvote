name: Daily Vote & Bill Cache Fetch
on:
  schedule:
    - cron: '0 5 * * *'   # 5:00am UTC daily — runs 1hr before daily-fetch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-votes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch votes and bills
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python fetch_votes.py

      - name: Commit cached data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/votes/ data/bills/
          git diff --cached --quiet || git commit -m "chore: vote & bill cache update $(date -u +'%Y-%m-%d')"
          git push --force-with-lease origin main
