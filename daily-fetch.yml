name: Daily Congress Data Fetch
on:
  workflow_run:
    workflows: ["Daily Vote & Bill Cache Fetch"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Only run if fetch-votes succeeded (skip if it failed)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Congress.gov data
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/data.json
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d')"
          git push --force-with-lease origin main
