name: Daily Congress Data Fetch

on:
  schedule:
    # Runs every day at 6:00 AM UTC (2am ET / 11pm PT)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Also lets you trigger it manually from the GitHub Actions tab

permissions:
  contents: write   # needed to commit data.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Congress.gov data
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          OPENSECRETS_API_KEY: ${{ secrets.OPENSECRETS_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d')"
          git push
